; SENTINEL — ESP32 Test Beacon
; Controllable 2.4GHz transmitter for bench-testing the detection pipeline.
;
; Build & flash:
;   cd tools/esp32_beacon
;   pio run -t upload
;   pio device monitor -b 115200

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
