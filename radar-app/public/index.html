<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drone RF Radar</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #0f0;
    }
    #radar-container {
      position: relative;
    }
    canvas {
      background: #000;
      border: 2px solid #0f0;
      box-shadow: 0 0 20px #0f0;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
    }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; padding: 20px;">
    <!-- Radar -->
    <div id="radar-container">
      <h2 style="text-align:center; color:#0f0; margin:10px;">RF Radar</h2>
      <canvas id="radar" width="700" height="700"></canvas>
      <div id="info" style="text-align:center; margin-top:10px;">
        Degree: -- | Strength: --
      </div>
    </div>

    <!-- Time series plots -->
    <div id="timeseries-container">
      <h2 style="text-align:center; color:#0f0; margin:10px;">Signal History</h2>
      <canvas id="timeseries" width="700" height="700"></canvas>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ───────────────────────────────────────────────
// Shared setup
// ───────────────────────────────────────────────
const socket = io();
const radarCanvas = document.getElementById('radar');
const radarCtx = radarCanvas.getContext('2d');
const centerX = radarCanvas.width / 2;
const centerY = radarCanvas.height / 2;
const maxRadius = Math.min(centerX, centerY) - 40;

let sweepAngle = 0;
let targets = [];

// ─── Radar drawing functions ─────────────────────────────────────────────
function drawGrid() {
  radarCtx.strokeStyle = '#0f03';
  radarCtx.lineWidth = 1;
  // Concentric rings
  for (let r = maxRadius / 5; r <= maxRadius; r += maxRadius / 5) {
    radarCtx.beginPath();
    radarCtx.arc(centerX, centerY, r, 0, Math.PI * 2);
    radarCtx.stroke();
  }
  // Radial lines
  for (let a = 0; a < 360; a += 45) {
    const rad = a * Math.PI / 180;
    radarCtx.beginPath();
    radarCtx.moveTo(centerX, centerY);
    radarCtx.lineTo(centerX + maxRadius * Math.cos(rad), centerY + maxRadius * Math.sin(rad));
    radarCtx.stroke();
  }
}

function drawSweep() {
  sweepAngle = (sweepAngle + 3) % 360;
  const rad = sweepAngle * Math.PI / 180;
  radarCtx.strokeStyle = '#0f0';
  radarCtx.lineWidth = 3;
  radarCtx.shadowBlur = 15;
  radarCtx.shadowColor = '#0f0';
  radarCtx.beginPath();
  radarCtx.moveTo(centerX, centerY);
  radarCtx.lineTo(centerX + maxRadius * Math.cos(rad), centerY + maxRadius * Math.sin(rad));
  radarCtx.stroke();
  radarCtx.shadowBlur = 0;
}

function drawTargets() {
  for (let i = targets.length - 1; i >= 0; i--) {  // reverse loop → safe splice
    const t = targets[i];
    radarCtx.fillStyle = `rgba(0, 255, 0, ${t.opacity})`;
    radarCtx.beginPath();
    radarCtx.arc(t.x, t.y, 6 + t.strength / 8, 0, Math.PI * 2);
    radarCtx.fill();
    t.opacity -= 0.015;
    if (t.opacity <= 0) {
      targets.splice(i, 1);
    }
  }
}

function animateRadar() {
  radarCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
  drawGrid();
  drawTargets();
  drawSweep();
  requestAnimationFrame(animateRadar);
}
animateRadar();

// ───────────────────────────────────────────────
// Time-series (history graph)
// ───────────────────────────────────────────────
const MAX_POINTS = 180;           // ~3 min if 1 point/sec
const history = [];               // [{time, degree, amplitude}]

const tsCanvas = document.getElementById('timeseries');
const tsCtx = tsCanvas.getContext('2d');

function addDataPoint(degree, amplitude) {
  const now = Date.now();
  history.push({ time: now, degree, amplitude });
  if (history.length > MAX_POINTS) history.shift();
}

function drawTimeSeries() {
  tsCtx.clearRect(0, 0, tsCanvas.width, tsCanvas.height);
  if (history.length < 2) return;

  const minTime = history[0].time;
  const maxTime = history[history.length - 1].time;
  const timeRange = maxTime - minTime || 1;

  const w = tsCanvas.width;
  const h = tsCanvas.height;
  const pad = 50;

  tsCtx.strokeStyle = '#0f03';
  tsCtx.lineWidth = 1;
  tsCtx.fillStyle = '#0f0';
  tsCtx.font = '14px Courier New';

  // Grid
  for (let i = 0; i <= 5; i++) {
    const y = pad + (h - 2*pad) * (i/5);
    tsCtx.beginPath(); tsCtx.moveTo(pad, y); tsCtx.lineTo(w - pad, y); tsCtx.stroke();
    const x = pad + (w - 2*pad) * (i/5);
    tsCtx.beginPath(); tsCtx.moveTo(x, pad); tsCtx.lineTo(x, h - pad); tsCtx.stroke();
  }

  // Labels
  tsCtx.fillText("Amplitude (0–100)", pad + 10, pad - 10);
  tsCtx.fillText("Degree (0–360°)", pad + 10, h - pad + 25);
  tsCtx.fillText("Time →", w - pad - 60, h - 15);

  // Amplitude (green)
  tsCtx.strokeStyle = '#0f0';
  tsCtx.lineWidth = 2;
  tsCtx.beginPath();
  history.forEach((pt, i) => {
    const x = pad + (pt.time - minTime) / timeRange * (w - 2*pad);
    const y = (h - pad) - (pt.amplitude / 100) * (h - 2*pad);
    i === 0 ? tsCtx.moveTo(x, y) : tsCtx.lineTo(x, y);
  });
  tsCtx.stroke();

  // Degree (cyan)
  tsCtx.strokeStyle = '#0ff';
  tsCtx.beginPath();
  history.forEach((pt, i) => {
    const x = pad + (pt.time - minTime) / timeRange * (w - 2*pad);
    const y = (h - pad) - (pt.degree / 360) * (h - 2*pad);
    i === 0 ? tsCtx.moveTo(x, y) : tsCtx.lineTo(x, y);
  });
  tsCtx.stroke();

  // Legend
  tsCtx.fillStyle = '#0f0'; tsCtx.fillRect(w-180, 20, 15, 15); tsCtx.fillText("Amplitude", w-160, 33);
  tsCtx.fillStyle = '#0ff'; tsCtx.fillRect(w-180, 45, 15, 15); tsCtx.fillText("Degree", w-160, 58);
}

setInterval(drawTimeSeries, 150);   // ~6–7 fps — light on CPU

// ───────────────────────────────────────────────
// Receive simulated (or real) data
// ───────────────────────────────────────────────
socket.on('radar-data', (data) => {
  let { degree, amplitude } = data;

  // Safety: clamp values
  degree = Math.max(0, Math.min(360, Number(degree) || 0));
  amplitude = Math.max(0, Math.min(100, Number(amplitude) || 0));

  // Debug in browser console
  console.log('Received:', { degree: degree.toFixed(1), amplitude: amplitude.toFixed(1) });

  // Radar blip
  const normalized = amplitude / 100;
  const radius = maxRadius * (1 - normalized);  // stronger = closer to center
  const angleRad = degree * Math.PI / 180;
  const x = centerX + radius * Math.cos(angleRad);
  const y = centerY + radius * Math.sin(angleRad);

  targets.push({ x, y, strength: amplitude, opacity: 1.0 });

  // History for graphs
  addDataPoint(degree, amplitude);

  // Live readout
  document.getElementById('info').textContent =
    `Degree: ${degree.toFixed(1)}° | Strength: ${amplitude.toFixed(1)}`;
});
</script>
</body>
</html>
